<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAF8F3;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #e0ddd8;
    flex-shrink: 0;
  }
  .toolbar button {
    padding: 6px 14px;
    border: 1px solid #d0cdc8;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .toolbar button:hover {
    background: #f0eeea;
    border-color: #b0ada8;
  }
  .toolbar button.primary {
    background: #4A7C5C;
    color: #fff;
    border-color: #3a6a4a;
  }
  .toolbar button.primary:hover {
    background: #3a6a4a;
  }
  .status {
    font-size: 12px;
    color: #8A8478;
    margin-left: auto;
  }
  #diagram-container {
    flex: 1;
    overflow: auto;
    padding: 10px;
  }
  .error {
    padding: 20px;
    text-align: center;
    color: #C44545;
    font-size: 14px;
  }
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8A8478;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="primary" onclick="loadData()">Refresh</button>
  <button onclick="exportSVG()">Export SVG</button>
  <button onclick="exportPNG()">Export PNG</button>
  <button onclick="insertIntoSheet()">Insert into Sheet</button>
  <span class="status" id="status">Loading...</span>
</div>

<div id="diagram-container">
  <div class="loading">Loading diagram data from spreadsheet...</div>
</div>

<?!= include('KhaninDiagram') ?>

<script>
  var diagram = null;
  var currentConfig = null;

  function setStatus(text) {
    document.getElementById('status').textContent = text;
  }

  function loadData() {
    setStatus('Reading data...');
    google.script.run
      .withSuccessHandler(onDataLoaded)
      .withFailureHandler(onError)
      .getDiagramData();
  }

  function onDataLoaded(config) {
    if (config.error) {
      document.getElementById('diagram-container').innerHTML =
        '<div class="error">' + config.error + '</div>';
      setStatus('Error');
      return;
    }

    currentConfig = config;
    currentConfig.animation = { enabled: false };

    var container = document.getElementById('diagram-container');
    container.innerHTML = '';

    if (diagram) {
      try { diagram.destroy(); } catch(e) {}
    }

    diagram = KhaninDiagram(container, currentConfig);
    setStatus('Ready');
  }

  function onError(err) {
    document.getElementById('diagram-container').innerHTML =
      '<div class="error">Error: ' + err.message + '</div>';
    setStatus('Error');
  }

  function exportSVG() {
    if (!diagram) return;
    var svg = diagram.toSVG();
    var blob = new Blob([svg], { type: 'image/svg+xml' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'khanin-diagram.svg';
    a.click();
    URL.revokeObjectURL(url);
    setStatus('SVG exported');
  }

  function exportPNG() {
    if (!diagram) return;
    var canvas = document.querySelector('#diagram-container canvas');
    if (!canvas) return;
    var url = canvas.toDataURL('image/png');
    var a = document.createElement('a');
    a.href = url;
    a.download = 'khanin-diagram.png';
    a.click();
    setStatus('PNG exported');
  }

  function insertIntoSheet() {
    if (!diagram) return;
    setStatus('Inserting...');
    var canvas = document.querySelector('#diagram-container canvas');
    if (!canvas) return;
    var dataUrl = canvas.toDataURL('image/png');
    google.script.run
      .withSuccessHandler(function() { setStatus('Inserted into sheet'); })
      .withFailureHandler(function(err) { setStatus('Error: ' + err.message); })
      .insertDiagramImage(dataUrl);
  }

  // Load data on open
  loadData();
</script>
</body>
</html>
