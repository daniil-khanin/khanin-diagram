<script>
/**
 * KhaninDiagram v1.0.0
 * Circular flow diagram — standalone JS library
 * No dependencies. Canvas + SVG export.
 *
 * (c) 2026 Daniil Khanin and Khanin Solutions S.L.
 * License: BSL 1.1 (see LICENSE)
 */
(function(root) {
  'use strict';

  var VERSION = '1.0.0';
  var RAF = root.requestAnimationFrame || function(cb) { return setTimeout(cb, 16); };
  var CRAF = root.cancelAnimationFrame || clearTimeout;

  // ─── 2. Utilities ──────────────────────────────────────────────────────────

  function hexToRgb(hex) {
    if (hex.indexOf('rgb') === 0) {
      var m = hex.match(/[\d.]+/g);
      return [+m[0], +m[1], +m[2]];
    }
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    return [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];
  }

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function merge(base, over) {
    if (!over) return base;
    var r = {}, k;
    for (k in base) if (base.hasOwnProperty(k)) r[k] = base[k];
    for (k in over) if (over.hasOwnProperty(k)) {
      if (typeof base[k] === 'object' && base[k] !== null && !Array.isArray(base[k]) &&
          typeof over[k] === 'object' && over[k] !== null && !Array.isArray(over[k])) {
        r[k] = merge(base[k], over[k]);
      } else {
        r[k] = over[k];
      }
    }
    return r;
  }

  function onRing(angleDeg) {
    var a = angleDeg * Math.PI / 180;
    return { x: Math.cos(a), y: Math.sin(a) };
  }

  // ─── 3. Number formatting ─────────────────────────────────────────────────

  function fmt(v, money) {
    if (money) {
      if (v >= 1e6) return "$" + (v/1e6).toFixed(1) + "M";
      if (v >= 1e3) return "$" + (v/1e3).toFixed(1) + "K";
      return "$" + v;
    }
    if (v >= 1e6) return (v/1e6).toFixed(1) + "M";
    if (v >= 1e3) return (v/1e3).toFixed(1) + "K";
    return String(v);
  }

  // ─── 4. Auto-layout ───────────────────────────────────────────────────────

  function computeLayout(opts) {
    var nodes = opts.nodes || [];
    var flows = opts.flows || [];
    var zones = opts.zones || [];
    var manual = opts.layout || null;

    // Build adjacency
    var adj = { container: [] };
    var inDeg = {};
    var nodeMap = {};
    var i, n, f;

    for (i = 0; i < nodes.length; i++) {
      n = nodes[i];
      nodeMap[n.id] = n;
      adj[n.id] = [];
      inDeg[n.id] = [];
    }

    for (i = 0; i < flows.length; i++) {
      f = flows[i];
      if (!adj[f.from]) adj[f.from] = [];
      if (!inDeg[f.to]) inDeg[f.to] = [];
      adj[f.from].push(f.to);
      inDeg[f.to].push(f.from);
    }

    // BFS depth from container
    var depth = { container: 0 };
    var queue = ['container'];
    var visited = { container: true };
    while (queue.length > 0) {
      var cur = queue.shift();
      var nb = adj[cur] || [];
      for (i = 0; i < nb.length; i++) {
        if (!visited[nb[i]]) {
          visited[nb[i]] = true;
          depth[nb[i]] = (depth[cur] || 0) + 1;
          queue.push(nb[i]);
        }
      }
    }

    var maxDepth = 1;
    for (var k in depth) {
      if (k !== 'center' && k !== 'container' && depth[k] > maxDepth) maxDepth = depth[k];
    }

    // Zone map
    var zoneMap = {};
    for (i = 0; i < zones.length; i++) zoneMap[zones[i].id] = zones[i];

    // Group nodes by zone
    var zoneNodes = {};
    for (i = 0; i < nodes.length; i++) {
      n = nodes[i];
      var zId = n.zone || 'default';
      if (!zoneNodes[zId]) zoneNodes[zId] = [];
      zoneNodes[zId].push(n);
    }

    // Assign positions
    var positions = {};
    for (var zoneId in zoneNodes) {
      if (!zoneNodes.hasOwnProperty(zoneId)) continue;
      var zi = zoneMap[zoneId];
      var zNodes = zoneNodes[zoneId];
      zNodes.sort(function(a, b) { return (depth[a.id] || 1) - (depth[b.id] || 1); });

      for (var j = 0; j < zNodes.length; j++) {
        var node = zNodes[j];
        var d = depth[node.id] || 1;
        var x = lerp(-0.55, 0.55, d / maxDepth);
        var ySign = 1;
        if (zi) {
          var mid = (zi.arc[0] + zi.arc[1]) / 2;
          ySign = (mid > 90 && mid < 270) ? -1 : 1;
          // supply arc [180,360] → upper half (y<0), demand [0,180] → lower half (y>0)
          if (zi.arc[0] >= 180) ySign = -1;
          else ySign = 1;
        }
        var yStep = 0.25;
        var yBase = ySign * (0.15 + j * yStep);
        positions[node.id] = { x: x, y: yBase };
      }
    }

    // Merge nodes → push toward y=0
    for (i = 0; i < nodes.length; i++) {
      n = nodes[i];
      var sources = inDeg[n.id] || [];
      var srcZones = {};
      for (var s = 0; s < sources.length; s++) {
        var sn = nodeMap[sources[s]];
        if (sn && sn.zone) srcZones[sn.zone] = true;
      }
      if (Object.keys(srcZones).length >= 2 && positions[n.id]) {
        positions[n.id].y *= 0.3;
      }
    }

    // Force relaxation
    var ids = Object.keys(positions);
    for (var iter = 0; iter < 3; iter++) {
      for (i = 0; i < ids.length; i++) {
        for (var m = i + 1; m < ids.length; m++) {
          var p1 = positions[ids[i]], p2 = positions[ids[m]];
          var dx = p2.x - p1.x, dy = p2.y - p1.y;
          var dd = Math.sqrt(dx*dx + dy*dy);
          if (dd < 0.22 && dd > 0.001) {
            var push = (0.22 - dd) * 0.5;
            var nx = dx/dd, ny = dy/dd;
            p1.x -= nx * push; p1.y -= ny * push;
            p2.x += nx * push; p2.y += ny * push;
          }
        }
      }
      for (i = 0; i < ids.length; i++) {
        var p = positions[ids[i]];
        var r = Math.sqrt(p.x*p.x + p.y*p.y);
        if (r > 0.70) { p.x *= 0.70/r; p.y *= 0.70/r; }
      }
    }

    // Label positions
    var labelAbove = {};
    for (i = 0; i < ids.length; i++) {
      labelAbove[ids[i]] = positions[ids[i]].y < 0;
    }

    // Manual override
    if (manual) {
      for (var mk in manual) {
        if (manual.hasOwnProperty(mk)) {
          positions[mk] = { x: manual[mk].x, y: manual[mk].y };
          if (manual[mk].labelAbove !== undefined) {
            labelAbove[mk] = manual[mk].labelAbove;
          } else {
            labelAbove[mk] = manual[mk].y < 0;
          }
        }
      }
    }

    return { positions: positions, labelAbove: labelAbove };
  }

  // ─── 5. Canvas primitives ──────────────────────────────────────────────────

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ─── 6. Bezier math ───────────────────────────────────────────────────────

  function flowControlPoints(p1, p2, curveOffset) {
    curveOffset = curveOffset || 0;
    var dx = p2.x - p1.x;
    var dy = p2.y - p1.y;
    if (Math.abs(curveOffset) < 0.01) {
      return {
        c1: { x: p1.x + dx * 0.5, y: p1.y },
        c2: { x: p2.x - dx * 0.5, y: p2.y }
      };
    }
    var len = Math.hypot(dx, dy) || 1;
    var nx = -dy / len, ny = dx / len;
    var mx = (p1.x + p2.x) / 2 + nx * curveOffset;
    var my = (p1.y + p2.y) / 2 + ny * curveOffset;
    return {
      c1: { x: p1.x * 0.4 + mx * 0.6, y: p1.y * 0.4 + my * 0.6 },
      c2: { x: p2.x * 0.4 + mx * 0.6, y: p2.y * 0.4 + my * 0.6 }
    };
  }

  function bezPoint(p1, c1, c2, p2, t) {
    var u = 1 - t;
    return {
      x: u*u*u*p1.x + 3*u*u*t*c1.x + 3*u*t*t*c2.x + t*t*t*p2.x,
      y: u*u*u*p1.y + 3*u*u*t*c1.y + 3*u*t*t*c2.y + t*t*t*p2.y
    };
  }

  function bezTangent(p1, c1, c2, p2, t) {
    var u = 1 - t;
    var x = 3*u*u*(c1.x-p1.x) + 6*u*t*(c2.x-c1.x) + 3*t*t*(p2.x-c2.x);
    var y = 3*u*u*(c1.y-p1.y) + 6*u*t*(c2.y-c1.y) + 3*t*t*(p2.y-c2.y);
    var len = Math.hypot(x, y) || 1;
    return { x: x/len, y: y/len };
  }

  // ─── 7. Flow drawing ──────────────────────────────────────────────────────

  function drawFlow(ctx, p1, p2, w, color, curveOffset) {
    var cp = flowControlPoints(p1, p2, curveOffset);
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    ctx.lineCap = "butt";
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.bezierCurveTo(cp.c1.x, cp.c1.y, cp.c2.x, cp.c2.y, p2.x, p2.y);
    ctx.stroke();
  }

  function drawArrowhead(ctx, p1, p2, color, t, size, curveOffset) {
    t = t || 0.55; size = size || 7; curveOffset = curveOffset || 0;
    var cp = flowControlPoints(p1, p2, curveOffset);
    var pt = bezPoint(p1, cp.c1, cp.c2, p2, t);
    var tan = bezTangent(p1, cp.c1, cp.c2, p2, t);
    var nx = -tan.y, ny = tan.x;
    var tip = { x: pt.x + tan.x * size, y: pt.y + tan.y * size };
    var baseL = { x: pt.x - tan.x*size*0.3 + nx*size*0.7, y: pt.y - tan.y*size*0.3 + ny*size*0.7 };
    var baseR = { x: pt.x - tan.x*size*0.3 - nx*size*0.7, y: pt.y - tan.y*size*0.3 - ny*size*0.7 };
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(baseL.x, baseL.y);
    ctx.lineTo(baseR.x, baseR.y);
    ctx.closePath();
    ctx.fill();
  }

  function drawParticles(ctx, p1, p2, color, phase, count, curveOffset, S) {
    count = count || 3; curveOffset = curveOffset || 0;
    var cp = flowControlPoints(p1, p2, curveOffset);
    ctx.fillStyle = color;
    for (var i = 0; i < count; i++) {
      var t = (phase + i / count) % 1;
      var pt = bezPoint(p1, cp.c1, cp.c2, p2, t);
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 2 * S, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ─── 8. Node + label drawing ──────────────────────────────────────────────

  function nodeHeight(value, vMin, vMax, S) {
    var s = Math.sqrt(value), sMin = Math.sqrt(vMin), sMax = Math.sqrt(vMax);
    var t = sMax > sMin ? (s - sMin) / (sMax - sMin) : 0.5;
    return (20 + t * 60) * S;
  }

  function mergeNodeHeight(value, vMin, vMax, S) {
    return nodeHeight(value, vMin, vMax, S) * 1.35;
  }

  function flowWidth(value, vMin, vMax, S) {
    var s = Math.sqrt(value), sMin = Math.sqrt(vMin), sMax = Math.sqrt(vMax);
    var t = sMax > sMin ? (s - sMin) / (sMax - sMin) : 0.5;
    return (2.5 + t * 24) * S;
  }

  function drawNode(ctx, n, h, S, highlight) {
    var w = n.isMerge ? 12*S : 7*S;
    ctx.fillStyle = n.color;
    if (highlight) {
      ctx.shadowColor = n.color;
      ctx.shadowBlur = 12;
    }
    roundRect(ctx, n.px - w/2, n.py - h/2, w, h, w/2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Merge node edge highlights
    if (n.isMerge) {
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      roundRect(ctx, n.px - w/2, n.py - h/2, 3, h, 1.5);
      ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,0.10)";
      roundRect(ctx, n.px + w/2 - 3, n.py - h/2, 3, h, 1.5);
      ctx.fill();
    }
  }

  function drawLabel(ctx, n, h, S, colors, formatFn) {
    var above = n.labelAbove !== false;
    var g1 = 24*S, g2 = 14*S, g3 = 12*S, g4 = 20*S;
    var tyTitle = above ? n.py - h/2 - g1 : n.py + h/2 + g2;
    var tyValue = above ? n.py - h/2 - g2 + 2*S : n.py + h/2 + g1 + 6*S;
    var tyDelta = above ? n.py + h/2 + g3 : n.py - h/2 - 6*S;
    var tySub   = above ? n.py + h/2 + g4 + 4*S : n.py - h/2 - g2 - 6*S;

    var fTitle = Math.round(10*S);
    var fValue = Math.round(12*S);
    var fDelta = Math.round(8*S);
    var fSub   = Math.round(8*S);
    var ff = '-apple-system, BlinkMacSystemFont, Inter, sans-serif';

    ctx.textAlign = "center";
    ctx.fillStyle = colors.text;
    ctx.font = "600 " + fTitle + "px " + ff;
    ctx.fillText(n.label, n.px, tyTitle);

    ctx.font = "700 " + fValue + "px " + ff;
    ctx.fillText(formatFn(n.value, n.money), n.px, tyValue);

    var up = n.delta >= 0;
    ctx.fillStyle = up ? colors.up : colors.down;
    ctx.font = "600 " + fDelta + "px " + ff;
    ctx.fillText((up ? "\u25B2 +" : "\u25BC ") + Math.abs(n.delta).toFixed(1) + "%", n.px, tyDelta);

    if (n.subtitle) {
      ctx.fillStyle = colors.muted;
      ctx.font = "400 " + fSub + "px " + ff;
      ctx.fillText(n.subtitle, n.px, tySub);
    }
  }

  // ─── 9. Ring drawing ──────────────────────────────────────────────────────

  function drawRing(ctx, cx, cy, R, S, opts, bgColor) {
    var zones = opts.zones || [];
    var colors = opts.colors;
    var ff = '-apple-system, BlinkMacSystemFont, Inter, sans-serif';

    ctx.lineCap = "butt";

    // Zone arcs (thick colored bands)
    for (var i = 0; i < zones.length; i++) {
      var z = zones[i];
      var rgb = hexToRgb(z.color);
      var arcColor = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.50)';
      ctx.strokeStyle = arcColor;
      ctx.lineWidth = 7 * S;
      ctx.beginPath();
      ctx.arc(cx, cy, R, z.arc[0] * Math.PI / 180, z.arc[1] * Math.PI / 180);
      ctx.stroke();
    }

    // Ring outline
    ctx.strokeStyle = colors.ring;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.stroke();

    // Zone labels (pill badges on ring)
    for (i = 0; i < zones.length; i++) {
      var zone = zones[i];
      var midDeg = (zone.arc[0] + zone.arc[1]) / 2;
      // Place label at a visually nice angle on the arc
      var labelAngleDeg = zone.labelAngle !== undefined ? zone.labelAngle : midDeg;
      var a = labelAngleDeg * Math.PI / 180;
      var lx = cx + Math.cos(a) * R;
      var ly = cy + Math.sin(a) * R;

      ctx.font = "700 " + Math.round(9*S) + "px " + ff;
      var tw = ctx.measureText(zone.label).width;
      var padX = 8*S, padY = 4*S;
      // Pill background
      ctx.fillStyle = bgColor || '#FAF8F3';
      roundRect(ctx, lx - tw/2 - padX, ly - 7*S - padY, tw + padX*2, 14*S + padY*2, 9*S);
      ctx.fill();
      // Pill border
      var zc = zone.color;
      ctx.strokeStyle = zc;
      ctx.lineWidth = 1;
      roundRect(ctx, lx - tw/2 - padX, ly - 7*S - padY, tw + padX*2, 14*S + padY*2, 9*S);
      ctx.stroke();
      // Text
      ctx.fillStyle = zc;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(zone.label, lx, ly);
    }
    ctx.textBaseline = "alphabetic";

    // Container (MAU) label — to the left of the ring
    var container = opts.container;
    if (container) {
      var formatFn = opts._fmt || fmt;
      // Leader line
      ctx.strokeStyle = colors.muted;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - R - 12*S, cy);
      ctx.lineTo(cx - R, cy);
      ctx.stroke();
      // Dot on ring
      ctx.fillStyle = colors.ring;
      ctx.beginPath();
      ctx.arc(cx - R, cy, 2.5*S, 0, Math.PI * 2);
      ctx.fill();

      var mg = 18 * S;
      ctx.textAlign = "right";
      ctx.fillStyle = colors.muted;
      ctx.font = "500 " + Math.round(8*S) + "px " + ff;
      ctx.fillText("CONTAINER", cx - R - mg, cy - 16*S);

      ctx.fillStyle = colors.text;
      ctx.font = "600 " + Math.round(11*S) + "px " + ff;
      ctx.fillText(container.label, cx - R - mg, cy);

      ctx.font = "700 " + Math.round(18*S) + "px " + ff;
      ctx.fillText(formatFn(container.value, container.format === 'money'), cx - R - mg, cy + 18*S);

      if (container.delta !== undefined) {
        var up = container.delta >= 0;
        ctx.fillStyle = up ? colors.up : colors.down;
        ctx.font = "600 " + Math.round(9*S) + "px " + ff;
        ctx.fillText((up ? "\u25B2 +" : "\u25BC ") + Math.abs(container.delta).toFixed(1) + "%", cx - R - mg, cy + 32*S);
      }
    }
  }

  // ─── 10. Center bullseye ──────────────────────────────────────────────────

  function drawCenter(ctx, cx, cy, r, center, S, colors, bgColor, formatFn) {
    if (!center) return;
    var ff = '-apple-system, BlinkMacSystemFont, Inter, sans-serif';

    // Glow
    var grad = ctx.createRadialGradient(cx, cy, r * 0.4, cx, cy, r * 1.7);
    grad.addColorStop(0, 'rgba(74,124,92,0.18)');
    grad.addColorStop(1, 'rgba(74,124,92,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 1.7, 0, Math.PI * 2);
    ctx.fill();

    // Circle
    ctx.fillStyle = colors.centerFill;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Text
    var textColor = bgColor || '#FAF8F3';
    ctx.textAlign = "center";
    ctx.fillStyle = textColor;
    ctx.font = "600 " + Math.round(9*S) + "px " + ff;
    ctx.fillText(center.label.toUpperCase(), cx, cy - 10*S);

    ctx.font = "700 " + Math.round(18*S) + "px " + ff;
    ctx.fillText(formatFn(center.value, center.format === 'money'), cx, cy + 8*S);

    if (center.delta !== undefined) {
      var up = center.delta >= 0;
      ctx.fillStyle = 'rgba(250,248,243,0.75)';
      ctx.font = "600 " + Math.round(8*S) + "px " + ff;
      ctx.fillText((up ? "\u25B2 +" : "\u25BC ") + Math.abs(center.delta).toFixed(1) + "%", cx, cy + 22*S);
    }
  }

  // ─── 11. Hit testing + tooltip ────────────────────────────────────────────

  function hitTest(mx, my, computed) {
    var nodes = computed.nodes;
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      var hitW = 40;
      if (mx >= n.px - hitW && mx <= n.px + hitW &&
          my >= n.py - n.h/2 - 30 && my <= n.py + n.h/2 + 30) {
        return n.id;
      }
    }
    // Bullseye
    var dx = mx - computed.cx, dy = my - computed.cy;
    if (Math.sqrt(dx*dx + dy*dy) <= computed.rRev * 1.5) return '__center__';
    return null;
  }

  // ─── 12. Render orchestrator ──────────────────────────────────────────────

  function buildGroupColors(colors) {
    return {
      supply:  colors.supply  || '#A89B7E',
      demand:  colors.demand  || '#3A4047',
      output:  colors.output  || colors.ring,
      revenue: colors.revenue || colors.centerFill,
      merge:   colors.merge   || '#C97C3F',
      flowSupply:  colors.flowSupply  || 'rgba(168,155,126,0.45)',
      flowDemand:  colors.flowDemand  || 'rgba(58,64,71,0.32)',
      flowRevenue: colors.flowRevenue || 'rgba(74,124,92,0.45)',
      flowDirect:  colors.flowDirect  || 'rgba(58,64,71,0.45)',
      flowMerge:   colors.flowMerge   || 'rgba(58,64,71,0.30)'
    };
  }

  function nodeColor(group, gc) {
    return gc[group] || gc.supply;
  }

  function flowColorFor(kind, gc) {
    if (kind === "revenue") return gc.flowRevenue;
    if (kind === "demand")  return gc.flowDemand;
    if (kind === "direct")  return gc.flowDirect;
    if (kind === "merge")   return gc.flowMerge;
    return gc.flowSupply;
  }

  function flowArrowColor(kind, gc) {
    if (kind === "revenue") return gc.revenue;
    if (kind === "supply")  return gc.supply;
    if (kind === "demand")  return gc.demand;
    if (kind === "direct")  return gc.demand;
    if (kind === "merge")   return '#6B7178';
    return gc.demand;
  }

  function render(state) {
    var cv = state.canvas;
    var ctx = state.ctx;
    var opts = state.opts;
    var wrapper = state.wrapper;
    var dpr = root.devicePixelRatio || 1;
    var rect = wrapper.getBoundingClientRect();
    var W = rect.width;
    var H = W * (opts.aspectRatio || 0.9);
    if (H < 500) H = 500;
    if (H > 950) H = 950;
    wrapper.style.height = H + 'px';

    cv.width = W * dpr;
    cv.height = H * dpr;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var S = clamp(W / 860, 0.55, 1.2);
    state.S = S;

    ctx.clearRect(0, 0, W, H);

    var colors = opts.colors;
