<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khanin Diagram — Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FAF8F3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  #demo { width: 100%; max-width: 900px; }
  .controls { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .controls button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .controls button:hover { background: #f0f0f0; border-color: #bbb; }
</style>
</head>
<body>

<div id="demo"></div>

<div class="controls">
  <button onclick="exportSVG()">Export SVG</button>
  <button onclick="toggleAnimation()">Toggle Animation</button>
  <button onclick="destroyDiagram()">Destroy</button>
  <button onclick="recreate()">Recreate</button>
</div>

<script src="khanin-diagram.js"></script>
<script>
var config = {
  container: { label: "MAU", value: 2150000, delta: -3.2 },
  center:    { label: "Revenue", value: 720000, delta: +1.2, format: "money" },

  zones: [
    { id: "supply", label: "SUPPLY", arc: [180, 360], color: "#A89B7E", labelAngle: 225 },
    { id: "demand", label: "DEMAND", arc: [0, 180],   color: "#3A4047", labelAngle: 45  }
  ],

  nodes: [
    { id: "sellers",      label: "Sellers",       value:   98400, delta: -5.6,  zone: "supply", group: "output" },
    { id: "freeSellers",  label: "Free Sellers",  value:   62700, delta: -7.3,  zone: "supply", group: "supply" },
    { id: "adsFree",      label: "Ads Free",      value:  215300, delta: -2.8,  zone: "supply", group: "supply" },
    { id: "leadsFree",    label: "Leads Free",    value:  612500, delta: -16.4, zone: "supply", group: "merge" },
    { id: "customers",    label: "Customers",     value:   35700, delta: +4.5,  zone: "demand", group: "demand", subtitle: "Sellers Paid" },
    { id: "adsPaid",      label: "Ads Paid",      value:   44800, delta: -8.9,  zone: "demand", group: "demand" },
    { id: "leadsPaid",    label: "Leads Paid",    value:  488200, delta: -13.7, zone: "demand", group: "merge", subtitle: "4.2 leads/ad" },
    { id: "leadsTotal",   label: "Leads Total",   value: 1100700, delta: -15.3, zone: "demand", group: "output" },
    { id: "transactions", label: "Transactions",  value:  184600, delta: +2.1,  zone: "demand", group: "revenue" }
  ],

  flows: [
    { from: "container",    to: "sellers",      value:   98400, group: "supply" },
    { from: "sellers",      to: "freeSellers",  value:   62700, group: "supply" },
    { from: "sellers",      to: "customers",    value:   35700, group: "demand" },
    { from: "freeSellers",  to: "adsFree",      value:  215300, group: "supply" },
    { from: "adsFree",      to: "leadsFree",    value:  612500, group: "supply" },
    { from: "customers",    to: "adsPaid",      value:   44800, group: "demand" },
    { from: "adsPaid",      to: "leadsPaid",    value:  488200, group: "demand" },
    { from: "container",    to: "leadsTotal",   value: 1100700, group: "direct" },
    { from: "leadsTotal",   to: "leadsFree",    value:  612500, group: "merge" },
    { from: "leadsTotal",   to: "leadsPaid",    value:  488200, group: "merge" },
    { from: "adsPaid",      to: "transactions", value:  184600, group: "revenue" },
    { from: "transactions", to: "center",       value:  720000, group: "revenue" }
  ],

  layout: {
    sellers:      { x: -0.50, y: -0.10, labelAbove: false },
    freeSellers:  { x: -0.24, y: -0.42, labelAbove: true },
    adsFree:      { x:  0.08, y: -0.52, labelAbove: true },
    leadsFree:    { x:  0.40, y: -0.42, labelAbove: true },
    customers:    { x: -0.24, y:  0.32, labelAbove: false },
    adsPaid:      { x:  0.08, y:  0.48, labelAbove: false },
    leadsPaid:    { x:  0.40, y:  0.42, labelAbove: false },
    leadsTotal:   { x:  0.68, y:  0.00, labelAbove: true },
    transactions: { x:  0.36, y:  0.16, labelAbove: true }
  },

  colors: {
    ring: '#2A2A2A',
    background: '#FAF8F3',
    up: '#2D7A4A',
    down: '#C44545',
    text: '#2A2A2A',
    muted: '#8A8478',
    centerFill: '#4A7C5C'
  },

  animation: { enabled: true, speed: 0.18 }
};

var diagram = KhaninDiagram(document.getElementById('demo'), config);

function exportSVG() {
  var svg = diagram.toSVG();
  var blob = new Blob([svg], { type: 'image/svg+xml' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'khanin-diagram.svg'; a.click();
  URL.revokeObjectURL(url);
}

var animOn = true;
function toggleAnimation() {
  animOn = !animOn;
  config.animation = { enabled: animOn, speed: 0.18 };
  diagram.update(config);
}

function destroyDiagram() { diagram.destroy(); }
function recreate() { diagram = KhaninDiagram(document.getElementById('demo'), config); }
</script>
</body>
</html>
